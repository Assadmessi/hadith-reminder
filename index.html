<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Hadith Reminder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="card">
      <p class="badge">Random Hadith Reminder</p>
      <h1>Random Hadith Reminder</h1>
      <p class="subtitle">
        Read a real random hadith anytime with language support and offline fallback.
      </p>

      <div class="search-controls">
        <div>
          <label class="label" for="languageSelect">Language</label>
          <select id="languageSelect"></select>
        </div>

        <div class="actions">
          <button id="randomBtn">Generate Random Hadith</button>
        </div>
      </div>

      <section id="statusSection" class="statusSection hidden" aria-live="polite">
        <p id="status" class="status"></p>
      </section>

      <section id="randomResult" class="result hidden">
        <blockquote id="hadithText" class="hadithText"></blockquote>
        <p id="reference" class="reference"></p>
        <p id="grade" class="grade"></p>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
