<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hadith AI Reminder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="card">
      <p class="badge">Hadith AI Reminder</p>
      <h1>Hadith AI Reminder</h1>
      <p class="subtitle">
        Generate a real random hadith, then get a short AI reflection based only on that hadith.
      </p>

      <div class="search-controls">
        <div>
          <label class="label" for="languageSelect">Language</label>
          <select id="languageSelect"></select>
        </div>

        <div class="actions">
          <button id="randomBtn">Generate Random Hadith</button>
        </div>
      </div>

      <section id="statusSection" class="statusSection hidden" aria-live="polite">
        <p id="status" class="status"></p>
      </section>

      <section id="randomResult" class="result hidden">
        <blockquote id="hadithText" class="hadithText"></blockquote>
        <p id="reference" class="reference"></p>
        <p id="grade" class="grade"></p>
      </section>

      <section id="aiSection" class="result hidden">
        <div class="section-head">
          <h2>AI Reflection</h2>
          <p class="mini">A short reminder based only on the hadith shown above.</p>
        </div>
        <div id="aiAnswer" class="ai-answer"></div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
